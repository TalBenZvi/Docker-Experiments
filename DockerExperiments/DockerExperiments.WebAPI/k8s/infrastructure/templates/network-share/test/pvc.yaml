apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.networkShare.testPvcName }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded, hook-failed
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  storageClassName: {{ .Values.networkShare.storageClassName }}