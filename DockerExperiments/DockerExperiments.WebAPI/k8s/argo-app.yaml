apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docker-experiments-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TalBenZvi/Docker-Experiments.git
    targetRevision: main
    path: DockerExperiments/DockerExperiments.WebAPI/k8s/docker-experiments
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: docker-experiments
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
