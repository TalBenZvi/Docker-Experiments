apiVersion: v1
kind: Pod
metadata:
  name: smb-tester
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded, hook-failed
spec:
  restartPolicy: Never
  containers:
    - name: alpine
      image: alpine
      command: ["/bin/sh", "-c", "echo 'SUCCESS' > /data/test-from-openshift.txt"]
      volumeMounts:
        - name: smb-mount
          mountPath: /data
  volumes:
    - name: smb-mount
      persistentVolumeClaim:
        claimName: "{{ .Values.networkShare.id }}-pvc"