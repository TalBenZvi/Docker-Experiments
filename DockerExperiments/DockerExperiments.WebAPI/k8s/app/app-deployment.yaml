apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-example-webapi-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-example-webapi
  template:
    metadata:
      labels:
        app: docker-example-webapi
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: webapi-container
          image: docker-experiments-webapi:0.2.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: Db__Host
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: HOST
            - name: Db__Database
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: DATABASE
            - name: Db__Username
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: USERNAME
            - name: Db__Password
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: PASSWORD
            - name: FileStorage__DirectoryPath
              value: /app/storage
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          volumeMounts:
            - name: working-volume
              mountPath: /app/storage
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
      volumes:
        - name: working-volume
          emptyDir:
            sizeLimit: "500Mi"
